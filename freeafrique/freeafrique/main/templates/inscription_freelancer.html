<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription Freelance - FreeAfrique</title>
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f9fafb;
        }
        .custom-checkbox {
            position: relative;
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1rem;
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 1.5rem;
            font-size: 1rem;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
            border: 1px solid transparent;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.15s ease-in-out;
        }

        .btn-primary {
            background-color: #3b82f6;
            border-color: #3b82f6;
            color: white;
        }

        .btn-primary:hover {
            background-color: #1e40af;
            border-color: #1e40af;
        }

        .alert {
            padding: 1rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid transparent;
        }

        .alert-danger {
            background-color: #fee2e2;
            border-color: #fca5a5;
            color: #991b1b;
        }

        .alert-success {
            background-color: #d1fae5;
            border-color: #6ee7b7;
            color: #065f46;
        }
            border-radius: 4px;
            transition: all 0.2s;
        }
        .custom-checkbox.checked {
            background-color: #4F46E5;
            border-color: #4F46E5;
        }
        .custom-checkbox.checked::after {
            content: '';
            position: absolute;
            left: 6px;
            top: 2px;
            width: 6px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        .form-input:focus {
            border-color: #4F46E5;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center">
                <a href="{% url 'home' %}" class="text-2xl font-['Pacifico'] text-primary">FreeAfrique</a>
            </div>
            <a href="{% url 'home' %}" class="flex items-center text-gray-700 hover:text-primary font-medium">
                <div class="w-5 h-5 flex items-center justify-center mr-2">
                    <i class="ri-arrow-left-line"></i>
                </div>
                Retour
            </a>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container mx-auto px-4 py-12 max-w-4xl">
        <div class="bg-white rounded-lg shadow-md p-8">
            <!-- Form Header -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-3">Créer un compte freelance</h1>
                <p class="text-gray-600 max-w-2xl mx-auto">Rejoignez notre communauté et commencez à proposer vos services aux clients.</p>
            </div>

            <!-- Registration Form -->
            <form id="registration-form">
                <!-- Personal Information -->
                <div class="mb-6">
                    <label for="name" class="block text-sm font-medium text-gray-700 mb-2">Nom <span class="text-red-500">*</span></label>
                    <input type="text" id="name" name="name" class="form-input w-full px-4 py-3 border border-gray-300 rounded-button focus:outline-none" placeholder="Votre nom" required>
                </div>
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Adresse email <span class="text-red-500">*</span></label>
                    <input type="email" id="email" name="email" class="form-input w-full px-4 py-3 border border-gray-300 rounded-button focus:outline-none" placeholder="exemple@email.com" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Mot de passe <span class="text-red-500">*</span></label>
                    <input type="password" id="password" name="password" class="form-input w-full px-4 py-3 border border-gray-300 rounded-button focus:outline-none" placeholder="8 caractères minimum" required>
                </div>
                <div class="mb-6">
                    <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirmer le mot de passe <span class="text-red-500">*</span></label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input w-full px-4 py-3 border border-gray-300 rounded-button focus:outline-none" placeholder="Confirmez votre mot de passe" required>
                </div>
                <div class="mb-8">
                    <div class="flex items-center mb-4">
                        <div class="custom-checkbox" data-checkbox="terms"></div>
                        <label for="terms" class="ml-2 text-gray-700">J'accepte les <a href="#" class="text-primary hover:underline">Conditions d'utilisation</a> et la <a href="#" class="text-primary hover:underline">Politique de confidentialité</a> <span class="text-red-500">*</span></label>
                    </div>
                </div>
                <div class="flex justify-end">
                    <button type="submit" class="px-6 py-3 bg-primary text-white font-medium !rounded-button whitespace-nowrap hover:bg-primary/90">Créer mon compte</button>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 py-8 mt-12">
        <div class="container mx-auto px-4">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <p class="text-gray-500 text-sm mb-4 md:mb-0">© 2025 FreeAfrique. Tous droits réservés.</p>
                <div class="flex flex-wrap justify-center gap-4 text-sm text-gray-500">
                    <a href="#" class="hover:text-primary transition-colors">Conditions d'utilisation</a>
                    <a href="#" class="hover:text-primary transition-colors">Politique de confidentialité</a>
                    <a href="#" class="hover:text-primary transition-colors">Aide</a>
                    <a href="#" class="hover:text-primary transition-colors">Contact</a>
                </div>
            </div>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('registration-form').addEventListener('submit', function(e) {
                e.preventDefault();
                // Ajouter votre logique de soumission ici
                alert('Compte créé avec succès !');
                window.location.href = '{% url "home" %}';  // Rediriger vers la page d'accueil
            });
        });
    </script>
</body>
</html>
